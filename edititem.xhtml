<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <ui:composition template="./template.xhtml">
        <ui:define name="content">
            <div class="page-header">
                <h2>Edit Item</h2>
                <p>Update the details for this stationery item</p>
            </div>
            <div class="form-container">
                <h:form id="editForm">
                    <h:messages styleClass="msg-error" showSummary="true" showDetail="false"/>
                    <h:inputHidden id="itemId" value="#{itemBean.currentItem.itemId}"/>
                    <div class="form-group">
                        <h:outputLabel for="ename" value="Item Name *" styleClass="form-label"/>
                        <h:inputText id="ename"
                                     value="#{itemBean.currentItem.name}"
                                     styleClass="form-control"
                                     required="true"
                                     requiredMessage="Item name is required.">
                            <f:validateLength minimum="2" maximum="150"/>
                        </h:inputText>
                        <h:message for="ename" styleClass="field-error"/>
                    </div>
                    <div class="form-group">
                        <h:outputLabel for="ecat" value="Category *" styleClass="form-label"/>
                        <h:selectOneMenu id="ecat"
                                         value="#{itemBean.currentItem.categoryId}"
                                         styleClass="form-control"
                                         required="true"
                                         requiredMessage="Please select a category.">
                            <f:selectItems value="#{itemBean.categorySelectItems}"/>
                        </h:selectOneMenu>
                        <h:message for="ecat" styleClass="field-error"/>
                    </div>
                    <div class="form-group">
                        <h:outputLabel for="ebrand" value="Brand" styleClass="form-label"/>
                        <h:inputText id="ebrand"
                                     value="#{itemBean.currentItem.brand}"
                                     styleClass="form-control">
                            <f:validateLength maximum="100"/>
                        </h:inputText>
                        <h:message for="ebrand" styleClass="field-error"/>
                    </div>
                    <div class="form-group">
                        <h:outputLabel for="eprice" value="Price (£) *" styleClass="form-label"/>
                        <h:inputText id="eprice"
                                     value="#{itemBean.currentItem.price}"
                                     styleClass="form-control"
                                     required="true"
                                     requiredMessage="Price is required.">
                            <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                            <f:validateDoubleRange minimum="0.01"/>
                        </h:inputText>
                        <h:message for="eprice" styleClass="field-error"/>
                    </div>
                    <div class="form-group">
                        <h:outputLabel for="eqty" value="Quantity in Stock *" styleClass="form-label"/>
                        <h:inputText id="eqty"
                                     value="#{itemBean.currentItem.quantityInStock}"
                                     styleClass="form-control"
                                     required="true"
                                     requiredMessage="Quantity is required.">
                            <f:validateLongRange minimum="0"/>
                        </h:inputText>
                        <h:message for="eqty" styleClass="field-error"/>
                    </div>
                    <div class="form-group">
                        <h:outputLabel for="edesc" value="Description" styleClass="form-label"/>
                        <h:inputTextarea id="edesc"
                                         value="#{itemBean.currentItem.description}"
                                         styleClass="form-control"
                                         rows="3"/>
                        <h:message for="edesc" styleClass="field-error"/>
                    </div>
                    <div class="form-group">
                        <h:outputLabel for="edate" value="Date Added (yyyy-MM-dd) *" styleClass="form-label"/>
                        <h:inputText id="edate"
                                     value="#{itemBean.currentItem.dateAdded}"
                                     styleClass="form-control"
                                     required="true"
                                     requiredMessage="Date is required.">
                            <f:convertDateTime pattern="yyyy-MM-dd"/>
                        </h:inputText>
                        <h:message for="edate" styleClass="field-error"/>
                    </div>
                    <div class="form-buttons">
                        <h:commandButton value="Save Changes"
                                         action="#{itemBean.updateItem}"
                                         styleClass="btn btn-primary"/>
                        <h:link outcome="viewItems" styleClass="btn btn-secondary">Cancel</h:link>
                    </div>
                </h:form>
            </div>
        </ui:define>
    </ui:composition>
</html>
