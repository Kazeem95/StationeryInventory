<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>StationeryHub</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; font-size: 15px; line-height: 1.6; }
            a { text-decoration: none; color: inherit; }
            .navbar { background: #1a3a5c; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 58px; }
            .navbar-brand a { color: #fff; font-size: 20px; font-weight: 700; }
            .navbar-links { display: flex; gap: 4px; }
            .nav-link { color: #b8c8d8; padding: 7px 13px; border-radius: 4px; font-size: 14px; border: none; background: transparent; cursor: pointer; }
            .nav-link:hover { background: #2d5a8e; color: #fff; }
            .navbar-session { display: flex; align-items: center; gap: 10px; }
            .welcome-msg { color: #7dd3a8; font-size: 13px; font-weight: 600; }
            .logout-link { color: #f4a261 !important; }
            .main-content { max-width: 1080px; margin: 28px auto; padding: 0 16px; }
            .page-header { margin-bottom: 24px; padding-bottom: 12px; border-bottom: 3px solid #1a3a5c; }
            .page-header h2 { font-size: 24px; color: #1a3a5c; font-weight: 700; }
            .page-header p { color: #666; font-size: 14px; margin-top: 3px; }
            .hero-banner { background: #1a3a5c; color: white; padding: 36px 28px; border-radius: 10px; margin-bottom: 30px; }
            .hero-banner h2 { font-size: 28px; color: white; margin-bottom: 8px; }
            .hero-banner p { color: #b8d4ee; font-size: 15px; }
            .card-grid { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 24px; }
            .card { background: #fff; border-radius: 10px; padding: 26px 22px; flex: 1; min-width: 200px; border-top: 4px solid #1a3a5c; text-align: center; }
            .card h3 { font-size: 17px; color: #1a3a5c; margin-bottom: 8px; margin-top: 10px; }
            .card p { color: #666; font-size: 14px; margin-bottom: 16px; }
            .card-icon { font-size: 34px; }
            .btn { display: inline-block; padding: 9px 18px; border-radius: 5px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
            .btn-primary { background: #1a3a5c; color: #fff; }
            .btn-secondary { background: #6c757d; color: #fff; }
            .btn-edit { background: #e6930a; color: #fff; padding: 4px 11px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; margin-right: 4px; }
            .btn-delete { background: #c0392b; color: #fff; padding: 4px 11px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; }
            .form-container { background: #fff; border-radius: 10px; padding: 30px 34px; max-width: 660px; }
            .login-container { max-width: 400px; margin: 0 auto; }
            .form-group { margin-bottom: 18px; }
            .form-label { display: block; font-weight: 600; margin-bottom: 5px; color: #444; font-size: 14px; }
            .form-control { width: 100%; padding: 9px 11px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; font-family: inherit; }
            .form-control:focus { outline: none; border-color: #1a3a5c; }
            textarea.form-control { resize: vertical; }
            .form-buttons { display: flex; gap: 10px; margin-top: 22px; }
            .field-error { color: #c0392b; font-size: 12px; display: block; margin-top: 3px; }
            .login-hint { margin-top: 14px; padding: 10px 14px; background: #eef2ff; border-radius: 5px; font-size: 13px; color: #555; text-align: center; }
            .search-bar { display: flex; gap: 14px; align-items: flex-end; background: #fff; padding: 16px 18px; border-radius: 10px; margin-bottom: 18px; flex-wrap: wrap; }
            .search-group { display: flex; flex-direction: column; flex: 1; min-width: 180px; }
            .search-input { border: 2px solid #1a3a5c !important; }
            .data-table { width: 100%; border-collapse: collapse; background: #fff; font-size: 14px; border-radius: 8px; overflow: hidden; }
            .data-table th { background: #1a3a5c; color: #fff; padding: 11px 14px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; }
            .data-table td { padding: 11px 14px; border-bottom: 1px solid #eee; vertical-align: middle; }
            .table-row-odd td { background: #fff; }
            .table-row-even td { background: #f7f9fc; }
            .data-table tr:hover td { background: #e8eef7; }
            .stock-low { color: #c0392b; font-weight: 700; }
            .stock-ok { color: #27ae60; font-weight: 600; }
            .no-results { background: #fff; padding: 30px; text-align: center; color: #888; border-radius: 8px; margin-bottom: 10px; }
            .results-count { text-align: right; font-size: 13px; color: #999; margin-top: 8px; }
            .msg-info { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 11px 15px; border-radius: 5px; margin-bottom: 16px; display: block; }
            .msg-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 11px 15px; border-radius: 5px; margin-bottom: 16px; display: block; }
            .session-info { background: #e3f0fb; border-left: 4px solid #1a3a5c; padding: 11px 16px; border-radius: 0 6px 6px 0; margin-top: 18px; font-size: 14px; }
            .contact-container { display: flex; flex-direction: column; gap: 18px; }
            .contact-card { background: #fff; border-radius: 10px; padding: 26px; border-left: 5px solid #1a3a5c; }
            .contact-card h3 { color: #1a3a5c; font-size: 17px; margin-bottom: 12px; }
            .contact-card p { color: #555; font-size: 14px; margin-bottom: 8px; line-height: 1.7; }
            .contact-details { display: flex; flex-direction: column; gap: 9px; }
            .contact-row { display: flex; gap: 14px; font-size: 14px; align-items: flex-start; }
            .contact-label { font-weight: 600; color: #1a3a5c; min-width: 150px; }
            .footer { background: #1a3a5c; color: #8aafc8; text-align: center; padding: 16px; font-size: 13px; margin-top: 50px; }
        </style>
    </h:head>
    <h:body>
        <div class="navbar">
            <div class="navbar-brand">
                <h:link outcome="home">StationeryHub</h:link>
            </div>
            <div class="navbar-links">
                <h:link outcome="home"      styleClass="nav-link">Home</h:link>
                <h:link outcome="viewItems" styleClass="nav-link">Items</h:link>
                <h:link outcome="addItem"   styleClass="nav-link">Add Item</h:link>
                <h:link outcome="contact"   styleClass="nav-link">Contact</h:link>
            </div>
            <div class="navbar-session">
                <h:panelGroup rendered="#{sessionBean.loggedIn}">
                    <span class="welcome-msg">#{sessionBean.welcomeMessage}</span>
                    <h:form style="display:inline;">
                        <h:commandLink value="Logout"
                                       action="#{loginBean.logout}"
                                       styleClass="nav-link logout-link"/>
                    </h:form>
                </h:panelGroup>
                <h:panelGroup rendered="#{not sessionBean.loggedIn}">
                    <h:link outcome="login" styleClass="nav-link">Login</h:link>
                </h:panelGroup>
            </div>
        </div>
        <div class="main-content">
            <h:messages globalOnly="true"
                        infoClass="msg-info"
                        errorClass="msg-error"
                        showSummary="true"
                        showDetail="false"/>
            <ui:insert name="content">Default content</ui:insert>
        </div>
        <div class="footer">
            <p>StationeryHub Inventory System 2025 | CS5003 Coursework | London Metropolitan University</p>
        </div>
    </h:body>
</html>
