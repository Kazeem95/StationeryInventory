<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <ui:composition template="./template.xhtml">
        <ui:define name="content">
            <div class="page-header">
                <h2>Stationery Items</h2>
                <p>Browse, search and manage all inventory items</p>
            </div>
            <h:form id="mainForm">
                <div class="search-bar">
                    <div class="search-group">
                        <h:outputLabel for="searchInput" value="Search:" styleClass="form-label"/>
                        <h:inputText id="searchInput"
                                     value="#{itemBean.searchKeyword}"
                                     styleClass="form-control search-input">
                            <f:ajax event="keyup"
                                    listener="#{itemBean.searchItems}"
                                    render="itemsTable"
                                    delay="400"/>
                        </h:inputText>
                    </div>
                    <div class="search-group">
                        <h:outputLabel for="catFilter" value="Category:" styleClass="form-label"/>
                        <h:selectOneMenu id="catFilter"
                                         value="#{itemBean.selectedCategoryFilter}"
                                         styleClass="form-control">
                            <f:selectItems value="#{itemBean.categoryFilterItems}"/>
                            <f:ajax event="change"
                                    listener="#{itemBean.filterByCategory}"
                                    render="itemsTable"/>
                        </h:selectOneMenu>
                    </div>
                    <div class="search-group" style="justify-content:flex-end;">
                        <h:link outcome="addItem" styleClass="btn btn-primary">+ Add New Item</h:link>
                    </div>
                </div>
                <h:panelGroup id="itemsTable" layout="block">
                    <h:dataTable id="itemTable"
                                 value="#{itemBean.itemList}"
                                 var="item"
                                 styleClass="data-table"
                                 headerClass="table-header"
                                 rowClasses="table-row-odd,table-row-even"
                                 rendered="#{not empty itemBean.itemList}">
                        <h:column>
                            <f:facet name="header">Name</f:facet>
                            <h:outputText value="#{item.name}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Category</f:facet>
                            <h:outputText value="#{item.categoryName}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Brand</f:facet>
                            <h:outputText value="#{item.brand}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Price</f:facet>
                            <h:outputText value="#{item.price}">
                                <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                            </h:outputText>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Stock</f:facet>
                            <h:outputText value="#{item.quantityInStock}"
                                          styleClass="#{item.quantityInStock lt 10 ? 'stock-low' : 'stock-ok'}"/>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Date Added</f:facet>
                            <h:outputText value="#{item.dateAdded}">
                                <f:convertDateTime pattern="dd/MM/yyyy"/>
                            </h:outputText>
                        </h:column>
                        <h:column>
                            <f:facet name="header">Actions</f:facet>
                            <h:commandLink value="Edit"
                                           action="#{itemBean.loadItemForEdit(item.itemId)}"
                                           styleClass="btn btn-edit"/>
                            <h:commandLink value="Delete"
                                           action="#{itemBean.deleteItem(item.itemId)}"
                                           styleClass="btn btn-delete"
                                           onclick="return confirm('Delete this item?');"/>
                        </h:column>
                    </h:dataTable>
                    <h:panelGroup rendered="#{empty itemBean.itemList}" layout="block">
                        <div class="no-results"><p>No items found.</p></div>
                    </h:panelGroup>
                    <div class="results-count">
                        <h:outputText value="Total: #{itemBean.itemList.size()} item(s)"/>
                    </div>
                </h:panelGroup>
            </h:form>
        </ui:define>
    </ui:composition>
</html>
